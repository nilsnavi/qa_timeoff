name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  block-theme:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Блокировка мержа feature/theme
        run: |
          if [ "${{ github.head_ref }}" = "feature/theme" ]; then
            echo "Ветка feature/theme заархивирована. Разработка светлой темы будет вестись с нуля."
            echo "Мерж этой ветки запрещён — используйте новую ветку для разработки темы."
            exit 1
          fi
          echo "OK"

  build-test:
    needs: block-theme
    if: always() && (needs.block-theme.result == 'success' || needs.block-theme.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint workspaces
        run: npm run lint

      - name: Run backend tests
        run: npm run test --workspace @qa-timeoff/backend

      - name: Run frontend tests
        run: npm run test --workspace @qa-timeoff/frontend

      - name: Build all workspaces
        run: npm run build

