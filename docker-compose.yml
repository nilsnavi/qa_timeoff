services:
  postgres:
    image: postgres:16-alpine
    container_name: qa-timeoff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qa_timeoff}
      POSTGRES_USER: ${POSTGRES_USER:-qa_timeoff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qa_timeoff}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qa_timeoff} -d ${POSTGRES_DB:-qa_timeoff}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - qa-timeoff-net

  redis:
    image: redis:7-alpine
    container_name: qa-timeoff-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qa-timeoff-net

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: qa-timeoff-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-qa_timeoff}:${POSTGRES_PASSWORD:-qa_timeoff}@postgres:5432/${POSTGRES_DB:-qa_timeoff}?schema=public"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN in .env}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://qatimeoff.ru}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://qatimeoff.ru}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://qatimeoff.ru,https://www.qatimeoff.ru,http://localhost:8080}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-logs}
      CACHE_TTL: ${CACHE_TTL:-300}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RUN_SEED: ${RUN_SEED:-false}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis,frontend,nginx,192.168.0.0/16}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - qa-timeoff-net

  db-backup:
    image: postgres:16-alpine
    container_name: qa-timeoff-db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qa_timeoff}
      POSTGRES_USER: ${POSTGRES_USER:-qa_timeoff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qa_timeoff}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}
    volumes:
      - db-backups:/backups
      - ./infra/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: |
      sh -c "
      echo '0 3 * * * /usr/local/bin/backup.sh' > /etc/crontabs/root
      crond -f -l 2
      "
    networks:
      - qa-timeoff-net

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: qa-timeoff-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - qa-timeoff-net

  caddy:
    image: caddy:2-alpine
    container_name: qa-timeoff-caddy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${APP_PORT:-8080}:80"
      # 443 is used by system nginx for SSL
    environment:
      - DOMAIN=${CADDY_DOMAIN:-localhost}
      - EMAIL=${CADDY_EMAIL:-}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - qa-timeoff-net

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  db-backups:

networks:
  qa-timeoff-net:
    driver: bridge
